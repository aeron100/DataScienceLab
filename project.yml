name: DataScienceLab
options:
  bundleIdPrefix: com.datasciencelab
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  DataScienceCore:
    path: DataScienceCore

targets:
  DataScienceLab:
    type: application
    platform: macOS
    deploymentTarget: "14.0"

    # ── Info.plist (generated by XcodeGen) ───────────────────────────────────
    info:
      path: DataScienceLab/Info.plist
      properties:
        # Bundle identity
        CFBundleDisplayName:       DataScienceLab
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion:           "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright:  "© 2026 DataScienceLab"
        NSPrincipalClass:          NSApplication

        # App Store metadata
        LSApplicationCategoryType: public.app-category.developer-tools
        LSMinimumSystemVersion:    "14.0"

        # Export compliance — no custom/proprietary encryption used;
        # Keychain uses OS-provided encryption (exempt).
        ITSAppUsesNonExemptEncryption: false

        # ATS: allow plain HTTP to loopback only (for Ollama on localhost)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true

    sources:
      - path: DataScienceLab
        excludes:
          - "**/*.entitlements"
          - "**/Info.plist"       # generated by XcodeGen — excluded from sources

    resources:
      - DataScienceLab/PrivacyInfo.xcprivacy
      - path: DataScienceLab/Resources/SampleData
        buildPhase: resources

    dependencies:
      - package: DataScienceCore

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER:  com.datasciencelab.mac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME:               DataScienceLab
        MARKETING_VERSION:          "1.0.0"
        CURRENT_PROJECT_VERSION:    "1"
        SWIFT_VERSION:              "5.9"
        MACOSX_DEPLOYMENT_TARGET:   "14.0"
        CODE_SIGN_ENTITLEMENTS:     DataScienceLab/DataScienceLab.entitlements
        ENABLE_HARDENED_RUNTIME:    YES
        CODE_SIGN_STYLE:            Automatic
        DEVELOPMENT_TEAM:           "MM6HKCA27T"
        SWIFT_STRICT_CONCURRENCY:   targeted

      configs:
        Debug:
          ONLY_ACTIVE_ARCH:             YES
          SWIFT_OPTIMIZATION_LEVEL:     "-Onone"
          GCC_OPTIMIZATION_LEVEL:       "0"
          ENABLE_TESTABILITY:           YES

        Release:
          ONLY_ACTIVE_ARCH:             NO
          SWIFT_OPTIMIZATION_LEVEL:     "-O"
          GCC_OPTIMIZATION_LEVEL:       s
          DEAD_CODE_STRIPPING:          YES
          STRIP_INSTALLED_PRODUCT:      YES
          DEBUG_INFORMATION_FORMAT:     dwarf-with-dsym

schemes:
  DataScienceLab:
    build:
      targets:
        DataScienceLab: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
